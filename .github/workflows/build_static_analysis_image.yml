name: Build Static Analysis Image

on:
  push:
    branches:
      - master
    paths:
      - docker/static_analysis.dockerfile
      - .github/workflows/build_static_analysis_image.yml
  pull_request:
    paths:
      - docker/static_analysis.dockerfile
      - .github/workflows/build_static_analysis_image.yml
  workflow_dispatch:

concurrency:
  group: build-static-analysis-image-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Verify Base Image
    runs-on: ubuntu-24.04
    env:
      DOCKERHUB_IMAGE: jdomagala/static_analysis
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          set -euo pipefail
          docker build \
            --file docker/static_analysis.dockerfile \
            --tag static-analysis-base:ci \
            .

      - name: Verify image exists
        run: |
          set -euo pipefail
          docker image inspect static-analysis-base:ci >/dev/null

      - name: Print image size
        run: |
          set -euo pipefail
          size_bytes="$(docker image inspect static-analysis-base:ci --format '{{.Size}}')"
          size_human="$(numfmt --to=iec-i --suffix=B "$size_bytes")"

          echo "static-analysis-base:ci size: ${size_human} (${size_bytes} bytes)"

          {
            echo "### Docker Image Size"
            echo
            echo "- \`static-analysis-base:ci\`: ${size_human} (${size_bytes} bytes)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test toolchain
        run: |
          set -euo pipefail
          docker run --rm static-analysis-base:ci bash -lc '
            set -euo pipefail

            cppcheck --version
            clang --version | head -n 1
            clang++ --version | head -n 1
            clang-tidy --version
            command -v run-clang-tidy
            cmake --version | head -n 1
            python --version
            pylint --version | head -n 1
            python -c "from github import Github; import importlib.metadata; print(\"PyGithub \" + importlib.metadata.version(\"PyGithub\"))"

            mkdir -p /tmp/smoke
            cd /tmp/smoke

            cat <<EOF > CMakeLists.txt
            cmake_minimum_required(VERSION 3.20)
            project(smoke LANGUAGES CXX)
            add_executable(smoke main.cpp)
            EOF

            cat <<EOF > main.cpp
            #include <iostream>

            int main() {
                std::cout << "smoke" << std::endl;
                return 0;
            }
            EOF

            cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            test -f build/compile_commands.json
            cppcheck --project=build/compile_commands.json --file-filter=main.cpp
            run-clang-tidy -p build main.cpp >/tmp/clang-tidy-smoke.txt 2>&1 || true
            test -f /tmp/clang-tidy-smoke.txt
          '

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: jdomagala
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          short_sha="${GIT_SHA::12}"
          latest_tag="${DOCKERHUB_IMAGE}:latest"
          sha_tag="${DOCKERHUB_IMAGE}:sha-${short_sha}"

          docker tag static-analysis-base:ci "$latest_tag"
          docker tag static-analysis-base:ci "$sha_tag"

          docker push "$latest_tag"
          docker push "$sha_tag"

          {
            echo "### Published Docker Tags"
            echo
            echo "- \`$latest_tag\`"
            echo "- \`$sha_tag\`"
          } >> "$GITHUB_STEP_SUMMARY"
